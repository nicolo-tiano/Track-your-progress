<style>
  *, *::before, *::after { box-sizing: border-box; -webkit-tap-highlight-color: transparent; margin: 0; padding: 0; }
  html, body { height: 100%; background: #0A0A0A; overscroll-behavior: none; }

  :root {

  .screen { padding: 0 20px; padding-bottom: calc(90px + var(--safe-bottom)); min-height: 100vh; padding-top: calc(52px + var(--safe-top)); }
  .screen-onboard { padding: 0 20px; padding-bottom: 40px; padding-top: calc(56px + var(--safe-top)); }

  .card { background: var(--card); border: 1px solid var(--border); border-radius: 16px; padding: 18px 20px; margin-bottom: 12px; }

  .h1 { font-size: 26px; font-weight: 800; letter-spacing: -0.02em; line-height: 1.1; }
  .h2 { font-size: 19px; font-weight: 700; letter-spacing: -0.01em; }
  .h3 { font-size: 14px; font-weight: 600; }
  .muted { color: var(--muted); font-size: 13px; }
  .label { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.09em; margin-bottom: 6px; display: block; }
  .eyebrow { font-size: 10px; color: var(--gold); letter-spacing: 0.15em; text-transform: uppercase; margin-bottom: 4px; }

  .input { background: var(--elevated); border: 1px solid var(--border); border-radius: 12px; color: var(--text); font-size: 16px; padding: 14px 16px; width: 100%; outline: none; transition: border-color 0.2s; display: block; }
  .input:focus { border-color: var(--gold); }
  .input-group { margin-bottom: 14px; }

  .btn-gold { background: linear-gradient(135deg, var(--gold) 0%, #A8832A 100%); color: #0A0A0A; font-weight: 700; font-size: 15px; border: none; border-radius: 14px; padding: 16px 24px; width: 100%; cursor: pointer; letter-spacing: 0.04em; display: block; }
  .btn-gold:disabled { opacity: 0.4; }
  .btn-ghost { background: transparent; color: var(--gold); font-weight: 600; font-size: 14px; border: 1px solid var(--gold-dim); border-radius: 14px; padding: 14px 20px; cursor: pointer; }
  .btn-danger { background: transparent; color: var(--red); font-weight: 600; font-size: 14px; border: 1px solid rgba(224,85,85,0.27); border-radius: 14px; padding: 14px 20px; cursor: pointer; width: 100%; }
  .btn-icon { background: none; border: none; cursor: pointer; color: var(--dim); font-size: 20px; padding: 4px; line-height: 1; }

  /* ─ Tab Bar ─ */
  #tab-bar {
    position: fixed; bottom: 0; left: 50%; transform: translateX(-50%);
    width: 100%; max-width: 480px;
    background: var(--surface); border-top: 1px solid var(--border);
    display: flex; z-index: 100;
    padding-bottom: var(--safe-bottom);

  .tab-item { flex: 1; padding: 10px 0 14px; text-align: center; cursor: pointer; font-size: 9px; letter-spacing: 0.07em; text-transform: uppercase; color: var(--dim); font-weight: 400; border-bottom: 2px solid transparent; transition: color 0.2s; display: flex; flex-direction: column; align-items: center; gap: 3px; }
  .tab-item.active { color: var(--gold); border-bottom-color: var(--gold); font-weight: 700; }
  .tab-item svg { display: block; }

  .row { display: flex; align-items: center; gap: 12px; }
  .grid3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; }
  .grid2 { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }

  .badge { font-size: 10px; font-weight: 700; letter-spacing: 0.07em; text-transform: uppercase; padding: 4px 10px; border-radius: 100px; display: inline-block; }

  .toggle { display: flex; background: var(--elevated); border-radius: 12px; padding: 4px; gap: 4px; }
  .toggle-btn { flex: 1; padding: 10px; border-radius: 10px; border: none; cursor: pointer; font-size: 12px; font-weight: 700; letter-spacing: 0.05em; text-transform: uppercase; background: transparent; color: var(--muted); transition: all 0.2s; }
  .toggle-btn.active { background: var(--gold); color: #0A0A0A; }

  .ex-card-done { border-color: rgba(91,173,127,0.33) !important; }

  .status-btn { flex: 1; padding: 11px; border-radius: 12px; border: none; cursor: pointer; font-size: 13px; font-weight: 700; background: var(--elevated); color: var(--muted); transition: all 0.2s; }
  .status-btn.active-done { background: var(--green); color: #fff; }

  .prog-fill { height: 100%; background: var(--gold); border-radius: 2px; transition: width 0.4s ease; }

  .chip { flex-shrink: 0; padding: 8px 16px; border-radius: 100px; border: none; cursor: pointer; font-size: 12px; font-weight: 600; background: var(--elevated); color: var(--muted); transition: all 0.2s; white-space: nowrap; }

  @keyframes spin { to { transform: rotate(360deg); } }
  .spinner { width: 44px; height: 44px; border-radius: 50%; border: 3px solid var(--border); border-top-color: var(--gold); animation: spin 0.8s linear infinite; margin: 0 auto 14px; }

  .stat-card { background: var(--card); border: 1px solid var(--border); border-radius: 16px; padding: 14px 10px; text-align: center; }
  .stat-val { font-size: 17px; font-weight: 800; }
  .stat-label { color: var(--muted); font-size: 10px; margin-top: 4px; letter-spacing: 0.07em; text-transform: uppercase; }

  .day-icon { width: 38px; height: 38px; border-radius: 11px; display: flex; align-items: center; justify-content: center; font-size: 17px; flex-shrink: 0; }
  .day-icon.workout { background: var(--gold-glow); border: 1px solid var(--gold-dim); }

  .history-ex-row { display: flex; justify-content: space-between; padding: 7px 0; border-top: 1px solid var(--border); font-size: 13px; }
  .scroll-x { overflow-x: auto; scrollbar-width: none; }
  .scroll-x::-webkit-scrollbar { display: none; }
  .sep { height: 10px; }
  .active-dot { position: absolute; bottom: 0; right: 0; width: 14px; height: 14px; border-radius: 50%; background: var(--gold); border: 2px solid var(--bg); }
  .danger-confirm { border-color: rgba(224,85,85,0.33) !important; }

  /* ─ Settings menu rows ─ */
  .settings-row { display: flex; align-items: center; gap: 16px; padding: 16px 20px; background: var(--card); border: 1px solid var(--border); border-radius: 16px; margin-bottom: 10px; cursor: pointer; transition: border-color 0.2s; }
  .settings-row:active { border-color: var(--gold-dim); }
  .settings-icon { width: 42px; height: 42px; border-radius: 12px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }

  /* ─ Splash screen ─ */
  #splash {
    position: fixed; inset: 0; background: var(--bg); z-index: 999;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    gap: 8px;
  }
  #splash .splash-title { font-size: 28px; font-weight: 900; letter-spacing: -0.03em; color: var(--text); }
  #splash .splash-sub { font-size: 14px; color: var(--gold); font-weight: 500; letter-spacing: 0.04em; }
  @keyframes fadeOut { from { opacity:1; } to { opacity:0; pointer-events:none; } }
  .splash-hide { animation: fadeOut 0.5s ease forwards; }

  /* ─ Profile photo overlay (long press) ─ */
  [data-avatar-longpress] {
    -webkit-touch-callout: none;
    -webkit-user-select: none;
    user-select: none;
    cursor: pointer;
  }
  [data-avatar-longpress] img,
  [data-avatar-longpress] span {
    pointer-events: none;
    -webkit-user-drag: none;
  }
  #photo-overlay {
    position: fixed; inset: 0; z-index: 500;
    background: rgba(0,0,0,0.82);
    display: flex; align-items: center; justify-content: center;
    backdrop-filter: blur(8px);
    -webkit-backdrop-filter: blur(8px);
    animation: fadeInOverlay 0.18s ease;
  }
  @keyframes fadeInOverlay { from { opacity:0; } to { opacity:1; } }
  #photo-overlay img {
    width: min(88vw, 380px); height: min(88vw, 380px);
    border-radius: 50%; object-fit: cover;
    border: 3px solid var(--gold-dim);
    box-shadow: 0 0 60px rgba(201,168,76,0.25);
    animation: popIn 0.2s cubic-bezier(0.34,1.56,0.64,1);

  #photo-overlay .overlay-letter {
    width: min(88vw, 380px); height: min(88vw, 380px);
    border-radius: 50%; background: var(--elevated);
    border: 3px solid var(--gold-dim);
    display: flex; align-items: center; justify-content: center;
    font-size: 120px; font-weight: 800; color: var(--gold);
    animation: popIn 0.2s cubic-bezier(0.34,1.56,0.64,1);

  .wip-wrap { display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 80px 20px; gap: 16px; text-align: center; }

</style>

<!-- Supabase -->
<script>
(function() {
  const URL  = "https://mgeljqfsnruowtbwygly.supabase.co";
  const KEY  = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im1nZWxqcWZzbnJ1b3d0Ynd5Z2x5Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODIzMTk4NzYsImV4cCI6MjA5Nzg5NTg3Nn0.SLsfpxTHv8vqfxcH7WNz3FncnbG27_zGIzI-TnjcFXI";
  const H    = { "Content-Type": "application/json", "apikey": KEY, "Authorization": "Bearer " + KEY };

  // ── REST helper ─────────────────────────────────────────────────
  async function q(path, opts={}) {
    const r = await fetch(URL + "/rest/v1/" + path, { headers: H, ...opts });
    if (!r.ok) {
      const txt = await r.text();
      throw new Error(txt);
    }
    const txt = await r.text();
    return txt ? JSON.parse(txt) : null;
  }

  // GET singola riga
  async function getRow(table, col, val) {
    const rows = await q(`${table}?${col}=eq.${encodeURIComponent(val)}&limit=1`);
    return rows?.[0] || null;
  }

  // INSERT
  async function insert(table, data) {
    return q(table, { method:"POST", body: JSON.stringify(data),
      headers: {...H, "Prefer":"return=representation"} });
  }

  // UPSERT (insert or update)
  async function upsert(table, data) {
    return q(table, { method:"POST", body: JSON.stringify(data),
      headers: {...H, "Prefer":"resolution=merge-duplicates,return=representation"} });
  }

  // PATCH
  async function patch(table, col, val, data) {
    return q(`${table}?${col}=eq.${encodeURIComponent(val)}`,
      { method:"PATCH", body: JSON.stringify(data),
        headers: {...H, "Prefer":"return=representation"} });
  }

  // ── Polling realtime (Supabase Realtime richiede websocket/SDK) ──
  let _pollTimer = null;
  let _pollUsername = null;
  let _pollCallback = null;
  let _lastRequests = "[]";
  let _lastFriends  = "[]";

  async function _poll() {
    if (!_pollUsername) return;
    try {
      const row = await getRow("users","username",_pollUsername);
      if (!row) return;
      const req = JSON.stringify(row.requests||[]);
      const fri = JSON.stringify(row.friends||[]);
      if (req !== _lastRequests || fri !== _lastFriends) {
        _lastRequests = req; _lastFriends = fri;
        _pollCallback(row.requests||[], row.friends||[]);
      }
    } catch {}
  }

  window.FB = {
    ready: () => true,

    // ── USERNAME ──────────────────────────────────────────────────
    async usernameExists(username) {
      try { return !!(await getRow("usernames","username",username)); }
      catch { return false; }
    },

    async registerUsername(username, localUid) {
      if (await this.usernameExists(username)) throw new Error("USERNAME_TAKEN");
      await insert("usernames", { username, uid: localUid });
      await insert("users", {
        username, uid: localUid, photo: null,
        logs: {}, prs: [],
        friends: [], requests: []
      });
    },

    // ── PUBBLICA DATI ─────────────────────────────────────────────
    async publishMyData(username, logs, prs, photo) {
      try {
        const last60 = Object.keys(logs).sort().slice(-60)
          .reduce((acc,k)=>{ acc[k]=logs[k]; return acc; }, {});
        // assicura che prs sia sempre un array
        const safePrs = Array.isArray(prs) ? prs : (typeof prs==="string" ? JSON.parse(prs) : []);
        await upsert("users", {
          username, logs: last60, prs: safePrs,
          photo: photo||null, updated_at: new Date().toISOString()
        });
      } catch(e) { console.warn("publishMyData:", e); }
    },

    // ── PUBBLICA SOLO I PR (più veloce) ───────────────────────────
    async publishPRs(username, prs) {
      try {
        const safePrs = Array.isArray(prs) ? prs : [];
        await patch("users","username",username, {
          prs: safePrs,
          updated_at: new Date().toISOString()
        });
      } catch(e) {
        // patch fallisce se la riga non esiste ancora — prova upsert
        try {
          const safePrs = Array.isArray(prs) ? prs : [];
          await upsert("users", { username, prs: safePrs, logs:{}, friends:[], requests:[], updated_at: new Date().toISOString() });
        } catch(e2) { console.warn("publishPRs:", e2); }
      }
    },

    // ── RICHIESTA AMICIZIA ────────────────────────────────────────
    async sendFriendRequest(from, to) {
      if (!(await this.usernameExists(to))) throw new Error("USER_NOT_FOUND");
      const toRow = await getRow("users","username",to);
      if (!toRow) throw new Error("USER_NOT_FOUND");
      const friends  = toRow.friends  || [];
      const requests = toRow.requests || [];
      if (friends.includes(from))               throw new Error("ALREADY_FRIENDS");
      if (requests.some(r=>r.from===from))      throw new Error("REQUEST_ALREADY_SENT");
      const newReqs = [...requests, { from, sentAt: Date.now() }];
      await patch("users","username",to, { requests: newReqs });
    },

    // ── ACCETTA RICHIESTA ─────────────────────────────────────────
    async acceptRequest(myUsername, fromUsername) {
      const myRow    = await getRow("users","username",myUsername);
      const otherRow = await getRow("users","username",fromUsername);
      const myReqs    = (myRow?.requests||[]).filter(r=>r.from!==fromUsername);
      const myFriends = [...new Set([...(myRow?.friends||[]), fromUsername])];
      await upsert("users", { ...(myRow||{}), username:myUsername, requests: myReqs, friends: myFriends, updated_at: new Date().toISOString() });
      const otherFriends = [...new Set([...(otherRow?.friends||[]), myUsername])];
      await upsert("users", { ...(otherRow||{}), username:fromUsername, friends: otherFriends, updated_at: new Date().toISOString() });
    },

    // ── RIFIUTA RICHIESTA ─────────────────────────────────────────
    async declineRequest(myUsername, fromUsername) {
      const myRow  = await getRow("users","username",myUsername);
      const myReqs = (myRow?.requests||[]).filter(r=>r.from!==fromUsername);
      await patch("users","username",myUsername, { requests: myReqs });
    },

    // ── RIMUOVI AMICO ─────────────────────────────────────────────
    async removeFriend(myUsername, otherUsername) {
      // Legge entrambi i profili completi
      const [myRow, otherRow] = await Promise.all([
        getRow("users","username",myUsername),
        getRow("users","username",otherUsername)
      ]);

      // Aggiorna il mio profilo rimuovendo l'altro
      if (myRow) {
        const updatedMe = {
          ...myRow,
          friends: (myRow.friends||[]).filter(f=>f!==otherUsername),
          updated_at: new Date().toISOString()
        };
        await upsert("users", updatedMe);
      }

      // Aggiorna il profilo dell'altro rimuovendo me
      if (otherRow) {
        const updatedOther = {
          ...otherRow,
          friends: (otherRow.friends||[]).filter(f=>f!==myUsername),
          updated_at: new Date().toISOString()
        };
        await upsert("users", updatedOther);
      }
    },

    // ── CARICA DATI AMICO ─────────────────────────────────────────
    async fetchFriendData(myUsername, friendUsername) {
      const myRow = await getRow("users","username",myUsername);
      if (!(myRow?.friends||[]).includes(friendUsername)) throw new Error("NOT_FRIENDS");
      return await getRow("users","username",friendUsername);
    },

    // ── CARICA MIO PROFILO ────────────────────────────────────────
    async fetchMyProfile(username) {
      try { return await getRow("users","username",username); }
      catch { return null; }
    },

    // ── ELIMINA USERNAME + DATI ───────────────────────────────────
    async deleteUsername(username) {
      // 1. Carica il profilo per sapere chi sono gli amici
      const profile = await getRow("users","username",username);
      const friendsList = profile?.friends || [];

      // 2. Rimuove questo username dalla lista friends di ogni amico
      for (const friendUsername of friendsList) {
        try {
          const friendRow = await getRow("users","username",friendUsername);
          if (!friendRow) continue;
          const updatedFriends = (friendRow.friends||[]).filter(f => f !== username);
          await upsert("users", { ...friendRow, friends: updatedFriends, updated_at: new Date().toISOString() });
        } catch(e) { console.warn("cleanup friend:", friendUsername, e); }
      }

      // 3. Elimina il profilo e lo username dal DB
      await q(`users?username=eq.${encodeURIComponent(username)}`, { method:"DELETE", headers:{...H,"Prefer":"return=minimal"} });
      await q(`usernames?username=eq.${encodeURIComponent(username)}`, { method:"DELETE", headers:{...H,"Prefer":"return=minimal"} });
    },

    // ── POLLING (ogni 8 secondi) ──────────────────────────────────
    listenNotifications(username, callback) {
      if (_pollTimer) clearInterval(_pollTimer);
      _pollUsername = username;
      _pollCallback = callback;
      _lastRequests = "[]"; _lastFriends = "[]";
      _poll();
      _pollTimer = setInterval(_poll, 8000);
    },
    stopListening() {
      if (_pollTimer) { clearInterval(_pollTimer); _pollTimer = null; }
    }
  };

  // Supabase pronto
  window._fbResolve();
})();
</script>

<script>
// ─── INDEXED DB ──────────────────────────────────────────────────
const DB_NAME = "ApexGymDB5";
function openDB() {
  return new Promise((res, rej) => {
    const req = indexedDB.open(DB_NAME, 1);
    req.onupgradeneeded = e => { if (!e.target.result.objectStoreNames.contains("store")) e.target.result.createObjectStore("store"); };
    req.onsuccess = () => res(req.result);
    req.onerror = () => rej(req.error);
  });
}
async function dbGet(key) {
  const db = await openDB();
  return new Promise((res, rej) => { const r = db.transaction("store","readonly").objectStore("store").get(key); r.onsuccess = () => res(r.result ?? null); r.onerror = () => rej(r.error); });
}
async function dbSet(key, value) {
  const db = await openDB();
  return new Promise((res, rej) => { const tx = db.transaction("store","readwrite"); tx.objectStore("store").put(value, key); tx.oncomplete = () => res(); tx.onerror = () => rej(tx.error); });
}
async function dbDel(key) {
  const db = await openDB();
  return new Promise((res, rej) => { const tx = db.transaction("store","readwrite"); tx.objectStore("store").delete(key); tx.oncomplete = () => res(); tx.onerror = () => rej(tx.error); });
}

// ─── FIREBASE HELPER ─────────────────────────────────────────────
// Aspetta che il modulo Firebase sia caricato (risolve in ~100ms al massimo)
async function waitFB() {
  await window._fbReady;
  return window.FB;
}

// ─── UTILS ───────────────────────────────────────────────────────
const todayStr = () => new Date().toISOString().slice(0, 10);
const uid = () => Math.random().toString(36).slice(2, 9);
function cycleDay(plan) {
  if (!plan?.startDate) return 0;
  // Se c'è un giorno da ripetere (allenamento saltato ieri), usalo
  const repeatDay = STATE._repeatDay;
  if (repeatDay !== null && repeatDay !== undefined) return repeatDay;
  const diff = Math.floor((new Date(todayStr()) - new Date(plan.startDate)) / 86400000);
  return Math.max(0, diff) % plan.cycleDays;
}
function esc(str) { return String(str||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;"); }

function avatarHTML(photo, name, size=48, longPress=false) {

function goldRingHTML(pct) {
  const r=34, circ=2*Math.PI*r, dash=circ*pct;
  const filter = pct>0 ? `filter:drop-shadow(0 0 5px #C9A84C)` : "";
  const color = pct===1 ? "#C9A84C" : "#F5F5F5";
  return `<div style="position:relative;width:84px;height:84px;flex-shrink:0">
    <svg width="84" height="84" style="transform:rotate(-90deg)">
      <circle cx="42" cy="42" r="${r}" fill="none" stroke="#282828" stroke-width="4"/>
      <circle cx="42" cy="42" r="${r}" fill="none" stroke="#C9A84C" stroke-width="4" stroke-linecap="round"
        stroke-dasharray="${dash.toFixed(2)} ${circ.toFixed(2)}" style="transition:stroke-dasharray 0.6s;${filter}"/>
    </svg>
    <div style="position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:800;color:${color}">${Math.round(pct*100)}%</div>

}

  setTimeout(() => {

  }, 50);

    overlay.innerHTML = "";

(function setupLongPress() {
  let _timer = null;
  let _fired = false;

  function onStart(e) {
    // solo se il target è dentro [data-avatar-longpress]
    const el = e.target.closest("[data-avatar-longpress]");
    if (!el) return;
    _fired = false;
    e.preventDefault();
    _timer = setTimeout(() => {
      _fired = true;
      showPhotoOverlay();
    }, 450);
  }
  function onEnd(e) {
    clearTimeout(_timer);
    if (_fired) e.preventDefault();
    _fired = false;
  }
  function onMove() {
    clearTimeout(_timer);
    _fired = false;
  }

  // Touch (mobile)
  document.addEventListener("touchstart", onStart, { passive: false });
  document.addEventListener("touchend",   onEnd,   { passive: false });
  document.addEventListener("touchmove",  onMove,  { passive: true });
  document.addEventListener("touchcancel",onMove,  { passive: true });

  // Mouse (desktop)
  document.addEventListener("mousedown", e => {
    const el = e.target.closest("[data-avatar-longpress]");
    if (!el) return;
    _fired = false;
    _timer = setTimeout(() => { _fired = true; showPhotoOverlay(); }, 450);
  });
  document.addEventListener("mouseup",    onEnd);
  document.addEventListener("mouseleave", onMove);
})();

// ─── HOME ────────────────────────────────────────────────────────
function buildHome(plan) {
  const cdIdx = cycleDay(plan);
  const dayData = plan.days[cdIdx];
  const isRest = dayData?.type==="rest";
  const today = todayStr();
  const todayLog = STATE.logs[today]||{};
  const exercises = dayData?.exercises||[];
  // Conta serie totali e serie completate (o esercizio saltato = tutte le sue serie contano)
  function setsInfo() {
    let total = 0, done = 0;
    exercises.forEach(ex => {
      const sets = ex.sets || 1;
      total += sets;
      const log = todayLog[ex.id] || {};
      if (log.status === "skip") {
        done += sets; // saltato conta come "gestito" per il progresso
      } else {
        done += Array.from({length: sets}, (_, i) => log[`s${i}_done`] === true).filter(Boolean).length;
      }
    });
    return { total, done };
  }
  const { total: totalSets, done: doneSets } = setsInfo();
  // Un esercizio è "fatto" ai fini del contatore testuale se tutte le sue serie sono spuntate o è saltato
  function exDone(ex) {
    const log = todayLog[ex.id]||{};
    if (log.status==="skip") return true;
    const sets = ex.sets||1;
    return Array.from({length:sets},(_,i)=>log[`s${i}_done`]===true).every(Boolean);
  }
  const doneCount = exercises.filter(ex=>exDone(ex)).length;
  const pct = totalSets > 0 ? doneSets / totalSets : 0;
  const allDone = pct === 1 && totalSets > 0;
  const dayName = ["Dom","Lun","Mar","Mer","Gio","Ven","Sab"][new Date().getDay()];

  function prevLoad(exId) {
    for (const d of Object.keys(STATE.logs).sort().reverse()) {
      if (d!==today && STATE.logs[d]?.[exId]) return STATE.logs[d][exId];
    }
    return null;
  }

  return `<div class="screen">
    <div class="row" style="margin-bottom:24px">
      ${avatarHTML(plan.photo, plan.name, 44, true)}
      <div style="flex:1">
        <div style="font-size:11px;color:#888;letter-spacing:0.08em;text-transform:uppercase">${dayName} · Giorno ${cdIdx+1} del ciclo</div>
        <div class="h1" style="font-size:22px;margin-top:2px">${isRest ? "Riposo" : allDone ? `<span style="color:var(--gold)">Fatto ✓</span>` : esc(plan.name)}</div>
      </div>
    </div>
    ${isRest ? `<div style="text-align:center;padding:60px 20px">
      <div style="font-size:64px;margin-bottom:16px">🌙</div>
      <div class="h2" style="color:#888">Recovery Mode</div>
      <p class="muted" style="margin-top:10px;line-height:1.6">Il riposo è dove avviene la crescita.</p>
    </div>` : `
      <div class="card row" style="gap:20px;margin-bottom:20px">
        ${goldRingHTML(pct)}
        <div>
          <div class="h2">${doneSets}/${totalSets} <span style="font-size:13px;font-weight:400;color:var(--muted)">serie</span></div>
          <div class="muted" style="margin-top:3px;font-size:12px">${doneCount}/${exercises.length} esercizi completati</div>
          ${allDone ? `<div class="badge badge-gold" style="margin-top:8px">Sessione Completata ✦</div>` : ""}
        </div>
      </div>
      ${exercises.map(ex => {
        const log = todayLog[ex.id]||{};
        const prev = prevLoad(ex.id);
        const st = log.status;
        // setDetails: array di {load, reps} per ogni serie
        const sets = ex.sets||1;
        const defaultDetails = Array.from({length:sets},(_,i)=>{
          const prevSet = prev?.sets_data?.[i];
          return { load: prevSet?.load ?? ex.load, reps: prevSet?.reps ?? ex.reps };
        });
        const setDetails = log.sets_data || defaultDetails;
        const allSetsDone = Array.from({length:sets},(_,i)=>log[`s${i}_done`]===true);
        const doneSetCount = allSetsDone.filter(Boolean).length;
        const allSetsCompleted = doneSetCount === sets;
        return `<div class="card${allSetsCompleted?" ex-card-done":st==="skip"?" ex-card-skip":""}" style="transition:all 0.3s">
          <div class="row" style="margin-bottom:10px">
            <div style="flex:1">
              <div class="h3">${esc(ex.name)}</div>
              ${prev ? `<div style="font-size:11px;color:#8A6B2A;margin-top:3px">↑ Ultima sessione registrata</div>` : ""}
            </div>
            ${allSetsCompleted ? `<span style="font-size:18px">✅</span>` : ""}
            ${st==="skip" ? `<span style="font-size:18px">❌</span>` : ""}
          </div>
          <div style="display:grid;grid-template-columns:18px 1fr 1fr 32px;gap:6px;align-items:center;margin-bottom:6px">
            <div></div>
            <div style="font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:0.08em;text-align:center">Carico kg</div>
            <div style="font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:0.08em;text-align:center">Reps</div>
            <div></div>
          </div>
          ${Array.from({length:sets},(_,i)=>{

// ─── CHARTS ─────────────────────────────────────────────────────
function buildCharts(plan) {
  const allExercises = [];
  const seen = new Set();
  plan.days.forEach(day => {
    if (day.type!=="workout") return;
    (day.exercises||[]).forEach(ex => { if (!seen.has(ex.id)) { seen.add(ex.id); allExercises.push(ex); } });
  });
  const activeExId = STATE.chart.selectedExId || (allExercises[0]?.id||null);
  const activeEx = allExercises.find(e=>e.id===activeExId)||allExercises[0]||null;

  function getChartData(ex) {
    if (!ex) return [];
    return Object.keys(STATE.logs).sort().flatMap(date => {
      const entry = STATE.logs[date]?.[ex.id];
      if (!entry || entry.status==="skip") return [];
      const load = parseFloat(entry.load??ex.load);
      if (isNaN(load)) return [];
      return [{ date: new Date(date+"T00:00:00").toLocaleDateString("it-IT",{day:"2-digit",month:"2-digit"}), load, fullDate:date }];
    });
  }

  const chartData = getChartData(activeEx);
  const hasData = chartData.length>=1;
  const maxLoad = hasData ? Math.max(...chartData.map(d=>d.load)) : 0;
  const latestLoad = hasData ? chartData[chartData.length-1].load : 0;
  const trend = chartData.length>=2 ? latestLoad-chartData[chartData.length-2].load : 0;

  return `<div class="screen">
    <div style="margin-bottom:20px"><div class="eyebrow">Analytics</div><div class="h1">Grafici</div></div>
    ${allExercises.length===0 ? `<div style="text-align:center;padding:60px 20px">${iconSVG("chart","#444",48)}<div class="h2" style="margin-top:12px">Nessun esercizio</div></div>` : `
      <div class="chips-row scroll-x">
        ${allExercises.map(ex=>`<button class="chip${ex.id===activeExId?" active":""}" data-select-ex="${ex.id}">${esc(ex.name)}</button>`).join("")}
      </div>
      <div class="grid3" style="gap:10px;margin-bottom:18px">
        <div class="stat-card"><div class="stat-val">${hasData?`${latestLoad}kg`:"—"}</div><div class="stat-label">Attuale</div></div>
        <div class="stat-card"><div class="stat-val" style="color:var(--gold)">${hasData?`${maxLoad}kg`:"—"}</div><div class="stat-label">Record</div></div>
        <div class="stat-card"><div class="stat-val" style="color:${trend>0?"var(--green)":trend<0?"var(--red)":"#888"}">${hasData&&chartData.length>=2?`${trend>0?"+":""}${trend}kg`:"—"}</div><div class="stat-label">Δ Ultima</div></div>
      </div>
      <div class="card" style="padding:20px 8px 12px">
        <div style="font-size:12px;color:#888;letter-spacing:0.07em;text-transform:uppercase;margin-bottom:14px;padding-left:12px">${esc(activeEx?.name||"")} — Carico (kg)</div>
        ${!hasData ? `<div style="text-align:center;padding:40px 0;color:#444;font-size:13px">Completa una sessione per vedere i dati.</div>` : buildLineChartSVG(chartData)}
      </div>
      ${hasData ? `<div style="margin-top:4px">
        <div style="font-size:10px;color:#888;letter-spacing:0.1em;text-transform:uppercase;margin-bottom:10px">Storico sessioni</div>
        ${[...chartData].reverse().slice(0,8).map((d,i)=>`
          <div class="card" style="display:flex;justify-content:space-between;align-items:center;padding:12px 16px">
            <span style="font-size:13px;color:#888">${d.date}</span>
            <span style="font-size:14px;font-weight:700;color:${i===0?"var(--gold)":"var(--text)"}">${d.load} kg</span>
          </div>`).join("")}
      </div>` : ""}
    `}
  </div>`;
}

function buildLineChartSVG(data) {
  const W=340, H=180, PL=38, PR=16, PT=4, PB=24;
  const iW=W-PL-PR, iH=H-PT-PB;
  const loads=data.map(d=>d.load);
  const minL=Math.min(...loads), maxL=Math.max(...loads);
  const range=maxL-minL||1;
  const pts=data.map((d,i)=>({ x:PL+i/(Math.max(data.length-1,1))*iW, y:PT+iH-(d.load-minL)/range*iH, d }));
  const path=pts.map((p,i)=>`${i===0?"M":"L"}${p.x.toFixed(1)},${p.y.toFixed(1)}`).join(" ");
  const area=`${path} L${pts[pts.length-1].x.toFixed(1)},${(PT+iH).toFixed(1)} L${PL},${(PT+iH).toFixed(1)} Z`;
  const step=Math.max(1,Math.ceil(data.length/6));
  const xLabels=pts.filter((_,i)=>i%step===0||i===pts.length-1);
  const yLabels=Array.from({length:5},(_,i)=>({ v:(minL+range*(i/4)).toFixed(0), y:PT+iH-(i/4)*iH }));
  return `<div style="overflow-x:auto"><svg width="${W}" height="${H}" viewBox="0 0 ${W} ${H}" style="max-width:100%;display:block">
    <defs><linearGradient id="ag" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#C9A84C" stop-opacity="0.18"/><stop offset="100%" stop-color="#C9A84C" stop-opacity="0"/></linearGradient></defs>
    ${yLabels.map(l=>`<line x1="${PL}" y1="${l.y.toFixed(1)}" x2="${W-PR}" y2="${l.y.toFixed(1)}" stroke="#282828" stroke-dasharray="3 3"/><text x="${PL-4}" y="${(+l.y+4).toFixed(1)}" text-anchor="end" fill="#888" font-size="10">${l.v}</text>`).join("")}
    <path d="${area}" fill="url(#ag)"/>
    <path d="${path}" fill="none" stroke="#C9A84C" stroke-width="2.5" stroke-linejoin="round" stroke-linecap="round"/>
    ${pts.map(p=>`<circle cx="${p.x.toFixed(1)}" cy="${p.y.toFixed(1)}" r="4" fill="#C9A84C"/>`).join("")}
    ${xLabels.map(p=>`<text x="${p.x.toFixed(1)}" y="${H}" text-anchor="middle" fill="#888" font-size="10">${p.d.date}</text>`).join("")}
  </svg></div>`;
}

          <div style="font-weight:700;font-size:14px">@${esc(fr.username)}</div>
          <div class="muted" style="font-size:11px;margin-top:2px">Tocca per vedere i PR</div>
        </div>
        <button class="btn-icon" data-friend-remove="${esc(fr.username)}" style="color:var(--red);font-size:18px">×</button>
      </div>`).join("")}

function buildFriendHistory(fd) {
  const logs = fd.logs || {};
  const dates = Object.keys(logs).sort().reverse().slice(0,30);
  if (dates.length===0) return `<div style="text-align:center;padding:40px 20px;color:#444">${iconSVG("history","#444",40)}<div style="font-size:14px;margin-top:12px;color:var(--muted)">Nessuna sessione registrata.</div></div>`;
  const expanded = STATE.friends.expandedFriendDate || null;
  return dates.map(date=>{
    const dayLog = logs[date] || {};
    // filtra chiavi speciali (_autoRest ecc)
    const exKeys = Object.keys(dayLog).filter(k=>!k.startsWith("_") && typeof dayLog[k]==="object");
    const isExpanded = expanded===date;
    const isAutoRest = dayLog._autoRest === true;
    const dateLabel = new Date(date+"T00:00:00").toLocaleDateString("it-IT",{weekday:"short",day:"numeric",month:"short"});
    return `<div class="card" style="cursor:pointer" data-friend-day-toggle="${date}">
      <div class="row" style="gap:12px">
        <div class="day-icon ${isAutoRest?"rest":"workout"}" style="width:36px;height:36px;font-size:15px">${isAutoRest?"🌙":"🏋️"}</div>
        <div style="flex:1">
          <div style="font-size:14px;font-weight:700;text-transform:capitalize">${dateLabel}</div>
          <div class="muted" style="font-size:11px;margin-top:2px">${isAutoRest?"Riposo":exKeys.length+" esercizi"}</div>
        </div>
        <div style="color:var(--dim);font-size:18px;transform:${isExpanded?"rotate(90deg)":"rotate(0deg)"};transition:transform 0.2s">›</div>
      </div>
      ${isExpanded && !isAutoRest ? `<div style="margin-top:12px;border-top:1px solid var(--border);padding-top:8px">
        ${exKeys.length===0 ? `<div class="muted" style="font-size:12px;padding:8px 0">Nessun dato disponibile.</div>` :
          exKeys.map(exId=>{
            const entry = dayLog[exId];
            if(!entry || typeof entry!=="object") return "";
            const name = entry.name || exId;
            const setsData = entry.sets_data || [];
            const skipped = entry.status==="skip";
            return `<div style="padding:8px 0;border-top:1px solid var(--border)">
              <div style="font-size:13px;font-weight:600;margin-bottom:4px">${esc(name)}</div>
              ${skipped
                ? `<div style="font-size:12px;color:var(--muted)">Saltato</div>`
                : setsData.length>0
                  ? setsData.map((s,i)=>{
                      const done = entry[`s${i}_done`]===true;
                      return `<div style="font-size:12px;color:${done?"var(--text)":"var(--muted)"};padding:2px 0">
                        Serie ${i+1}: ${s.load??0}kg × ${s.reps??0} rep${done?" ✓":""}
                      </div>`;
                    }).join("")
                  : `<div style="font-size:12px;color:var(--muted)">Dati serie non disponibili</div>`
              }
            </div>`;
          }).join("")
        }
      </div>` : ""}
    </div>`;
  }).join("");
}

function buildFriendPR(fd) {
  // Supabase può restituire prs come stringa JSON — parsing sicuro
  let prs = fd.prs || [];
  if (typeof prs === "string") { try { prs = JSON.parse(prs); } catch { prs = []; } }
  if (!Array.isArray(prs)) prs = [];

  if (prs.length===0) return `<div style="text-align:center;padding:40px 20px;color:#444">${iconSVG("trophy","#444",40)}<div style="font-size:14px;margin-top:12px;color:var(--muted)">Nessun PR registrato.</div></div>`;
  const bestByName = {};
  prs.forEach(pr=>{ if(pr?.name && (!bestByName[pr.name]||pr.load>bestByName[pr.name].load)) bestByName[pr.name]=pr; });
  const sorted = Object.values(bestByName).sort((a,b)=>b.load-a.load);
  if (sorted.length===0) return `<div style="text-align:center;padding:40px 20px;color:#444">${iconSVG("trophy","#444",40)}<div style="font-size:14px;margin-top:12px;color:var(--muted)">Nessun PR registrato.</div></div>`;
  return sorted.map((pr,i)=>`
    <div class="card row" style="gap:14px">
      <div style="width:44px;height:44px;border-radius:12px;background:var(--gold-glow);border:1px solid var(--gold-dim);display:flex;align-items:center;justify-content:center;flex-shrink:0">${iconSVG("trophy","#C9A84C",20)}</div>
      <div style="flex:1">
        <div class="h3">${esc(pr.name)}</div>
        <div style="font-size:11px;color:#888;margin-top:3px">${pr.date ? new Date(pr.date+"T00:00:00").toLocaleDateString("it-IT",{day:"2-digit",month:"short",year:"numeric"}) : ""}</div>
      </div>
      <div style="font-size:20px;font-weight:800;color:${i===0?"var(--gold)":"var(--text)"}">${pr.load}<span style="font-size:11px;color:#888;margin-left:2px">kg</span></div>
    </div>`).join("");
}

// ─── HISTORY (used inside settings) ─────────────────────────────
function buildHistory(plan) {
  const dates = Object.keys(STATE.logs).sort().reverse().slice(0,60);
  function getCycleDayForDate(d) { return Math.max(0, Math.floor((new Date(d+"T00:00:00")-new Date(plan.startDate))/86400000)) % plan.cycleDays; }

  const backBtn = `<div class="row" style="margin-bottom:24px">
    <button class="btn-icon" id="settings-back" style="font-size:22px;color:#888">${iconSVG("back","#888",22)}</button>
    <div style="flex:1"><div class="eyebrow">Training Log</div><div class="h1">Storico</div></div>
  </div>`;

  if (dates.length===0) return `<div class="screen">${backBtn}<div style="text-align:center;padding:40px 0">${iconSVG("history","#444",48)}<div class="h2" style="margin-top:14px">Nessuna sessione</div><p class="muted" style="margin-top:8px">Completa un workout.</p></div></div>`;

  const expanded = STATE.history?.expandedDate || null;

  return `<div class="screen">${backBtn}
    ${dates.map(date=>{
      const cdIdx=getCycleDayForDate(date);
      const dayData=plan.days[cdIdx];
      const dayLog=STATE.logs[date];
      const exercises=dayData?.exercises||[];
      const done=exercises.filter(ex=>dayLog[ex.id]?.status==="done").length;
      const skipped=exercises.filter(ex=>dayLog[ex.id]?.status==="skip").length;
      const isExpanded = expanded===date;
      const isRest=dayData?.type==="rest";
      const isAutoRest = !isRest && dayLog?._autoRest === true;
      const dateLabel=new Date(date+"T00:00:00").toLocaleDateString("it-IT",{weekday:"short",day:"numeric",month:"short"});
      return `<div class="card" style="cursor:pointer;transition:all 0.2s" data-history-toggle="${date}">
        <div class="row" style="gap:12px">
          <div class="day-icon ${(isRest||isAutoRest)?"rest":"workout"}" style="width:36px;height:36px;font-size:15px">${(isRest||isAutoRest)?"🌙":"🏋️"}</div>
          <div style="flex:1">
            <div style="font-size:14px;font-weight:700;text-transform:capitalize">${dateLabel}</div>
            <div class="muted" style="font-size:11px;margin-top:2px">${isAutoRest?`<span style="color:var(--red)">Riposo (allenamento saltato)</span>`:(isRest?"Riposo":`${done} fatti${skipped>0?" · "+skipped+" saltati":""}`)}</div>
          </div>
          <div style="color:var(--dim);font-size:18px;transition:transform 0.25s;transform:${isExpanded?"rotate(90deg)":"rotate(0deg)"}">›</div>
        </div>
        ${isExpanded && !isRest && !isAutoRest ? `<div style="margin-top:12px;border-top:1px solid var(--border);padding-top:8px">
          ${exercises.map(ex=>{
            const el=dayLog[ex.id]; if(!el) return "";
            if(el.status==="skip") return `<div class="history-ex-row"><span style="color:#444">${esc(ex.name)}</span><span style="color:#888">saltato</span></div>`;
            const sets=ex.sets||1;
            const setsData=el.sets_data||[];
            return `<div style="padding:8px 0;border-top:1px solid var(--border)">
              <div style="font-size:13px;font-weight:600;margin-bottom:6px">${esc(ex.name)}</div>
              ${Array.from({length:sets},(_,i)=>{
                const sd=setsData[i]||{};
                const done=el[`s${i}_done`]===true;
                return `<div style="display:flex;justify-content:space-between;font-size:12px;padding:3px 0;color:${done?"var(--text)":"var(--muted)"}">
                  <span>Serie ${i+1}</span>
                  <span>${sd.load??ex.load}kg × ${sd.reps??ex.reps} rep${done?" ✓":""}</span>
                </div>`;
              }).join("")}
            </div>`;
          }).join("")}
        </div>` : ""}
        ${isExpanded && isRest ? `<div style="margin-top:10px;text-align:center;font-size:12px;color:var(--muted);padding-top:8px;border-top:1px solid var(--border)">Giorno di riposo</div>` : ""}
      </div>`;
    }).join("")}
  </div>`;
}

          <div class="h3" style="color:var(--gold);margin-bottom:14px">Nuovo Esercizio</div>
          <div class="input-group"><label class="label">Nome</label><input class="input" id="exf-name" placeholder="Es. Squat" value="${esc(ed.exForm.name)}"/></div>
          <div class="grid3">
            <div><label class="label">Serie</label><input class="input" id="exf-sets" type="number" placeholder="3" value="${esc(ed.exForm.sets)}" style="text-align:center;padding:11px 8px"/></div>
            <div><label class="label">Reps</label><input class="input" id="exf-reps" type="number" placeholder="10" value="${esc(ed.exForm.reps)}" style="text-align:center;padding:11px 8px"/></div>
            <div><label class="label">Carico kg</label><input class="input" id="exf-load" type="number" placeholder="0" value="${esc(ed.exForm.load)}" style="text-align:center;padding:11px 8px"/></div>
          </div>
          <p class="muted" style="font-size:11px;margin-top:4px;margin-bottom:8px">Il carico e le reps verranno copiati su tutte le serie — modificabili singolarmente.</p>
          <div class="row" style="margin-top:10px">

      ` : ""}
      <button class="btn-gold" id="edit-day-save" style="margin-top:8px">Salva Modifiche</button>
    </div>`;
  }

  return `<div class="screen">
    <div class="row" style="margin-bottom:22px">
      <button class="btn-icon" id="settings-back" style="font-size:22px;color:#888">${iconSVG("back","#888",22)}</button>
      <div style="flex:1"><div class="eyebrow">Configurazione</div><div class="h1">Piano</div></div>
    </div>

    <!-- Profile edit -->
    <div class="card" style="margin-bottom:18px">
      <div class="row" style="margin-bottom:14px">

    <div style="height:14px"></div>
    <button class="btn-gold" id="plan-save-all">Salva Tutto</button>
  </div>`;

// ─── EVENTS ─────────────────────────────────────────────────────
function attachEvents() {
  const $$ = id => document.getElementById(id);

  // Tab bar
  document.querySelectorAll(".tab-item[data-tab]").forEach(el => {
    el.addEventListener("click", () => {

    try {
      const FB = await waitFB();
      FB.stopListening();
      await FB.deleteUsername(uname);
      await dbDel("myUsername");
      await dbDel("friendsList");
      STATE.friends.myUsername = null;
      STATE.friends.list = [];
      STATE.friends.requests = [];
      STATE.friends.confirmDeleteUsername = false;
      STATE.friends.deleteUsernameLoading = false;
      STATE.friends.usernameInput = "";
      render();
    } catch(e) {
      STATE.friends.deleteUsernameLoading = false;
      STATE.friends.confirmDeleteUsername = false;
      render();
    }
  });

  document.querySelectorAll("[data-select-ex]").forEach(el => {
    el.addEventListener("click", ()=>{STATE.chart.selectedExId=el.dataset.selectEx;render();});
  });

  // ─── PR ───
  const showPrForm = $$("show-pr-form");
  if (showPrForm) showPrForm.addEventListener("click",()=>{STATE.pr.showForm=true;render();});
  const prfCancel = $$("prf-cancel");
  if (prfCancel) prfCancel.addEventListener("click",()=>{STATE.pr.showForm=false;STATE.pr.form={name:"",load:"",date:""};render();});
  const prfSave = $$("prf-save");
  if (prfSave) prfSave.addEventListener("click", async () => {
    const name=$$("prf-name")?.value||""; const load=$$("prf-load")?.value||""; const date=$$("prf-date")?.value||todayStr();
    if(!name.trim()||!load) return;
    const entry={id:uid(),name,load:parseFloat(load),date};
    const newPrs=[...STATE.prs,entry].sort((a,b)=>b.load-a.load);
    await dbSet(`prs_${STATE.activeId}`,newPrs); STATE.prs=newPrs; STATE.pr.showForm=false; STATE.pr.form={name:"",load:"",date:""}; render();
    // sincronizza PR su Supabase subito
    if (STATE.friends.myUsername) {
      waitFB().then(FB=>FB.publishPRs(STATE.friends.myUsername, newPrs)).catch(()=>{});
    }
  });
  document.querySelectorAll("[data-delete-pr]").forEach(el => {
    el.addEventListener("click", async () => {
      const id=el.dataset.deletePr; const newPrs=STATE.prs.filter(p=>p.id!==id);
      await dbSet(`prs_${STATE.activeId}`,newPrs); STATE.prs=newPrs; render();
      // sincronizza PR su Supabase subito
      if (STATE.friends.myUsername) {
        waitFB().then(FB=>FB.publishPRs(STATE.friends.myUsername, newPrs)).catch(()=>{});
      }
    });
  });

  // ─── PLAN EDIT (inside settings) ───
  document.querySelectorAll("[data-edit-day]").forEach(el => {
    el.addEventListener("click", () => {
      const plan=activePlan();
      STATE.edit.editDay=parseInt(el.dataset.editDay);
      STATE.edit.showExForm=false; STATE.edit.exForm={name:"",sets:"",reps:"",load:""};
      if (!STATE.edit.localDays) STATE.edit.localDays=JSON.parse(JSON.stringify(plan.days));
      render();
    });
  });
  const editDayBack = $$("edit-day-back");
  if (editDayBack) editDayBack.addEventListener("click",()=>{STATE.edit.editDay=null;STATE.edit.showExForm=false;render();});
  const editDaySave = $$("edit-day-save");
  if (editDaySave) editDaySave.addEventListener("click", async () => {
    const plan=activePlan(); const updated={...plan,days:STATE.edit.localDays};
    await dbSet(`plan_${updated.id}`,updated); STATE.accounts=STATE.accounts.map(a=>a.id===updated.id?updated:a);
    STATE.edit.editDay=null; STATE.edit.showExForm=false; render();
  });
  document.querySelectorAll("[data-edit-day-type]").forEach(el => {
    el.addEventListener("click",()=>{
      const v=el.dataset.editDayType; const n=[...STATE.edit.localDays];
      n[STATE.edit.editDay]={...n[STATE.edit.editDay],type:v}; if(v==="rest")n[STATE.edit.editDay].exercises=[];
      STATE.edit.localDays=n; render();
    });
  });
  const editShowExForm = $$("edit-show-ex-form");
  if (editShowExForm) editShowExForm.addEventListener("click",()=>{STATE.edit.showExForm=true;render();});
  const editExfCancel = $$("edit-exf-cancel");
  if (editExfCancel) editExfCancel.addEventListener("click",()=>{STATE.edit.showExForm=false;render();});
  const editExfAdd = $$("edit-exf-add");
  if (editExfAdd) editExfAdd.addEventListener("click",()=>{
    const name=$$("exf-name")?.value||""; if(!name.trim()) return;
    const sets=parseInt($$("exf-sets")?.value)||3;
    const reps=parseInt($$("exf-reps")?.value)||10;
    const load=parseFloat($$("exf-load")?.value)||0;
    const setDetails=Array.from({length:sets},()=>({load,reps}));
    const ex={id:uid(),name,sets,reps,load,setDetails};
    const n=[...STATE.edit.localDays]; n[STATE.edit.editDay]={...n[STATE.edit.editDay],exercises:[...(n[STATE.edit.editDay].exercises||[]),ex]};
    STATE.edit.localDays=n; STATE.edit.showExForm=false; STATE.edit.exForm={name:"",sets:"",reps:"",load:""}; render();
  });

  // Per-set fields nel piano (impostazioni)
  document.querySelectorAll("[data-plan-set-ex]").forEach(el => {
    el.addEventListener("change", e => {
      const exId=el.dataset.planSetEx, idx=parseInt(el.dataset.planSetIdx), field=el.dataset.planSetField;
      const n=[...STATE.edit.localDays];
      const dayExs=[...(n[STATE.edit.editDay].exercises||[])];
      const exIdx=dayExs.findIndex(ex=>ex.id===exId); if(exIdx===-1) return;
      const ex={...dayExs[exIdx]};
      const details=[...(ex.setDetails||Array.from({length:ex.sets},()=>({load:ex.load,reps:ex.reps})))];
      details[idx]={...details[idx],[field]:parseFloat(e.target.value)||0};
      ex.setDetails=details;
      dayExs[exIdx]=ex; n[STATE.edit.editDay]={...n[STATE.edit.editDay],exercises:dayExs};
      STATE.edit.localDays=n;
    });
  });
  document.querySelectorAll("[data-edit-remove-ex]").forEach(el => {
    el.addEventListener("click",()=>{
      const id=el.dataset.editRemoveEx; const n=[...STATE.edit.localDays];
      n[STATE.edit.editDay]={...n[STATE.edit.editDay],exercises:n[STATE.edit.editDay].exercises.filter(e=>e.id!==id)};
      STATE.edit.localDays=n; render();
    });
  });
  const planSaveAll = $$("plan-save-all");
  if (planSaveAll) planSaveAll.addEventListener("click", async () => {
    const plan=activePlan(); const newName=$$("plan-edit-name")?.value||plan.name;
    const updated={...plan,name:newName,days:STATE.edit.localDays||plan.days};
    await dbSet(`plan_${updated.id}`,updated); STATE.accounts=STATE.accounts.map(a=>a.id===updated.id?updated:a);
    planSaveAll.textContent="✓ Salvato"; setTimeout(()=>{planSaveAll.textContent="Salva Tutto";},2000);
  });
  const planPhotoTrigger = $$("plan-photo-trigger");
  const planPhotoBtn = $$("plan-photo-btn");
  const planPhotoInput = $$("plan-photo-input");
  if (planPhotoInput) planPhotoInput.addEventListener("change", async e => {
    const file=e.target.files?.[0]; if(!file) return;
    const reader=new FileReader(); reader.onload=async ev=>{
      const plan=activePlan(); const updated={...plan,photo:ev.target.result};
      await dbSet(`plan_${updated.id}`,updated); STATE.accounts=STATE.accounts.map(a=>a.id===updated.id?updated:a); render();
    }; reader.readAsDataURL(file);
  });
  if (planPhotoBtn) planPhotoBtn.addEventListener("click",()=>planPhotoInput?.click());
  if (planPhotoTrigger) planPhotoTrigger.addEventListener("click",()=>planPhotoInput?.click());
}

// ─── HELPERS ────────────────────────────────────────────────────
async function finishOnboarding() {
  const ob = STATE.ob;
  // calcola startDate con offset per cicli settimanali
  let startDate = todayStr();
  if (ob.startOffset && ob.startOffset > 0) {
    const d = new Date(); d.setDate(d.getDate() - ob.startOffset);
    startDate = d.toISOString().slice(0,10);
  }
  const plan = { id:uid(), name:ob.name.trim(), photo:ob.photo, cycleDays:parseInt(ob.cycleDays), days:ob.days, startDate };
  if (STATE.appState==="onboarding_add") {
    const ids=[...(await dbGet("accountIds")||[]),plan.id];
    await dbSet("accountIds",ids);
    await dbSet(`plan_${plan.id}`,plan);
    await dbSet(`logs_${plan.id}`,{});
    await dbSet(`prs_${plan.id}`,[]);
    STATE.accounts=[...STATE.accounts,plan];
    STATE.appState="app"; STATE.edit.showAddAccount=false;
    await switchAccount(plan.id);
  } else {
    await dbSet("accountIds",[plan.id]);
    await dbSet(`plan_${plan.id}`,plan);
    await dbSet(`logs_${plan.id}`,{});
    await dbSet(`prs_${plan.id}`,[]);
    await dbSet("activeAccountId", plan.id);
    STATE.accounts=[plan]; STATE.activeId=plan.id;
    STATE.logs={}; STATE.prs=[];
    STATE.appState="app";
    render();
  }
}

async function switchAccount(id) {
  const plan = STATE.accounts.find(a=>a.id===id);
  if (!plan) return;
  STATE.activeId = id;
  await dbSet("activeAccountId", id);
  STATE.logs = (await dbGet(`logs_${id}`)) || {};
  STATE.prs  = (await dbGet(`prs_${id}`))  || [];
  STATE.tab  = "home";
  render();
}

// ─── HARDWARE BACK BUTTON (Android / browser) ───────────────────
function getNavLevel() {
  // Returns a numeric "depth" so we know if there's something to go back to
  if (STATE.appState === "onboarding") {
    return STATE.ob.step > 0 ? 1 : 0;
  }
  if (STATE.appState === "onboarding_add") {
    return STATE.ob.step > 0 ? 2 : 1;
  }
  // In-app
  if (STATE.settings.subPage === "plan" && STATE.edit.editDay !== null) return 3;
  if (STATE.settings.subPage !== null) return 2;
  if (STATE.tab !== "home") return 1;
  return 0;
}

function pushHistoryState() {
  const level = getNavLevel();
  // Always keep a base entry so popstate fires
  if (history.state?.level !== level) {
    history.pushState({ level }, "");
  }
}

function handleBack() {
  // Onboarding
  if (STATE.appState === "onboarding" || STATE.appState === "onboarding_add") {
    if (STATE.ob.step > 0) {
      if (STATE.ob.dayIndex > 0) { STATE.ob.dayIndex--; STATE.ob.showExForm = false; }
      else { STATE.ob.step = 0; }
      render(); return;
    }
    if (STATE.appState === "onboarding_add") {
      STATE.appState = "app"; STATE.edit.showAddAccount = false;
      STATE.ob = { step:0, name:"", cycleDays:"", photo:null, days:[], dayIndex:0, showExForm:false, exForm:{name:"",sets:"",reps:"",load:""} };
      render(); return;
    }
    return;
  }

  // Plan edit → day detail → back to plan list
  if (STATE.settings.subPage === "plan" && STATE.edit.editDay !== null) {
    STATE.edit.editDay = null; STATE.edit.showExForm = false;
    render(); return;
  }

  // Any settings sub-page → back to settings main
  if (STATE.settings.subPage !== null) {
    STATE.settings.subPage = null;
    STATE.settings.confirmResetHistory = false;
    STATE.settings.confirmDeleteAccount = false;
    render(); return;
  }

  // Any tab → back to home
  if (STATE.tab !== "home") {
    STATE.tab = "home";
    render(); return;
  }
}

window.addEventListener("popstate", e => {
  // If we're at level 0, there's nothing to go back to — let browser handle it
  if (getNavLevel() === 0) return;
  handleBack();
  // Re-push so the back button keeps working
  history.pushState({ level: getNavLevel() }, "");
});

// ─── ARRICCHISCE I LOG CON I NOMI DEGLI ESERCIZI ────────────────
// Aggiunge entry.name ai log storici che non ce l'hanno
function enrichLogsWithNames(logs, plans) {
  // costruisce mappa id→nome da tutti i piani
  const nameMap = {};
  plans.forEach(plan => {
    (plan.days||[]).forEach(day => {
      (day.exercises||[]).forEach(ex => { if(ex.id && ex.name) nameMap[ex.id]=ex.name; });
    });
  });
  const enriched = {};
  Object.keys(logs).forEach(date => {
    enriched[date] = {};
    Object.keys(logs[date]).forEach(key => {
      const entry = logs[date][key];
      if (key.startsWith("_") || typeof entry !== "object") {
        enriched[date][key] = entry;
      } else {
        enriched[date][key] = { ...entry, name: entry.name || nameMap[key] || key };
      }
    });
  });
  return enriched;
}

// ─── FRIENDS REALTIME LISTENER ───────────────────────────────────
async function startFriendsListener(username) {
  if (!username) return;
  const FB = await waitFB();
  FB.listenNotifications(username, (requests, friends) => {
    const prevReqCount = STATE.friends.requests.length;
    STATE.friends.requests = requests;

    // aggiorna lista amici — Supabase è la sorgente di verità
    const currentUsernames = STATE.friends.list.map(f=>f.username);
    friends.forEach(uname => {
      if (!currentUsernames.includes(uname))
        STATE.friends.list = [...STATE.friends.list, { username:uname, photo:null }];
    });
    // rimuovi amici eliminati o rimossi
    STATE.friends.list = STATE.friends.list.filter(f=>friends.includes(f.username));
    dbSet("friendsList", STATE.friends.list);

    // aggiorna UI
    if (STATE.tab==="friends" && STATE.appState==="app") {
      render();
    } else {
      // aggiorna solo il badge senza fare un render completo
      const badge = document.getElementById("friends-tab-badge");
      if (badge) {
        badge.textContent = requests.length > 0 ? requests.length : "";
        badge.style.display = requests.length > 0 ? "flex" : "none";
      } else if (requests.length !== prevReqCount) {
        // badge non esiste ancora, forza un render leggero della tab bar
        render();
      }
    }
  });
}

// ─── AUTO-REST + SKIP-DAY LOGIC ─────────────────────────────────
async function checkDayCompletion() {
  const plan = activePlan();
  if (!plan) return;
  const today = todayStr();
  const yesterday = (() => { const d=new Date(); d.setDate(d.getDate()-1); return d.toISOString().slice(0,10); })();

  // Solo se ieri non è stato ancora processato
  if (!STATE.logs[yesterday]) return; // nessun log ieri, niente da fare
  const lastChecked = await dbGet(`lastChecked_${STATE.activeId}`);
  if (lastChecked === today) return; // già controllato oggi

  // Calcola quale giorno del ciclo era ieri
  const diffYesterday = Math.max(0, Math.floor((new Date(yesterday+"T00:00:00") - new Date(plan.startDate)) / 86400000));
  const yesterdayCycleIdx = diffYesterday % plan.cycleDays;
  const yesterdayDayData = plan.days[yesterdayCycleIdx];

  if (yesterdayDayData?.type === "workout") {
    const exercises = yesterdayDayData.exercises || [];
    if (exercises.length > 0) {
      const yesterdayLog = STATE.logs[yesterday] || {};
      function exFullyDone(ex) {
        const log=yesterdayLog[ex.id]||{};
        if(log.status==="skip") return true;
        const sets=ex.sets||1;
        return Array.from({length:sets},(_,i)=>log[`s${i}_done`]===true).every(Boolean);
      }
      const allDone = exercises.every(exFullyDone);

      if (!allDone) {
        // Segna ieri come rest forzato
        const updatedYesterday = { ...STATE.logs[yesterday], _autoRest: true };
        STATE.logs = { ...STATE.logs, [yesterday]: updatedYesterday };
        await dbSet(`repeatDay_${STATE.activeId}`, yesterdayCycleIdx);
      }
    }
  }

  await dbSet(`logs_${STATE.activeId}`, STATE.logs);
  await dbSet(`lastChecked_${STATE.activeId}`, today);
}

// ─── INIT ────────────────────────────────────────────────────────
async function init() {
  const splash = document.getElementById("splash");

  // Inizializza lo stack della history
  history.replaceState({ level: 0 }, "");

  try {
    const ids = (await dbGet("accountIds")) || [];
    if (ids.length === 0) {
      STATE.appState = "onboarding";
    } else {
      const plans = await Promise.all(ids.map(id => dbGet(`plan_${id}`)));
      STATE.accounts = plans.filter(Boolean);
      const savedId = await dbGet("activeAccountId");
      STATE.activeId = STATE.accounts.find(a=>a.id===savedId)?.id || STATE.accounts[0]?.id;
      if (STATE.activeId) {
        STATE.logs = (await dbGet(`logs_${STATE.activeId}`)) || {};
        STATE.prs  = (await dbGet(`prs_${STATE.activeId}`))  || [];
        STATE._repeatDay = await dbGet(`repeatDay_${STATE.activeId}`);
        // Carica dati amici
        const savedUsername = await dbGet("myUsername");
        const savedFriends  = await dbGet("friendsList");
        if (savedUsername) {
          STATE.friends.myUsername = savedUsername;
          // carica richieste + stato amici da Firebase (aspetta che sia pronto)
          try {
            const FB = await waitFB();
            const profile = await FB.fetchMyProfile(savedUsername);
            if (profile) {
              STATE.friends.requests = profile.requests || [];
              const fbFriends = profile.friends || [];
              const localList  = savedFriends || [];
              const merged = fbFriends.map(uname => {
                const local = localList.find(f=>f.username===uname);
                return local || { username:uname, photo:null };
              });
              STATE.friends.list = merged;
              await dbSet("friendsList", merged);
              // pubblica PR subito (priorità alta — piccoli dati)
              const prs2 = await dbGet(`prs_${savedId}`) || [];
              FB.publishPRs(savedUsername, prs2).catch(()=>{});
              // pubblica anche i log arricchiti in background
              const plan2 = STATE.accounts.find(a=>a.id===savedId);
              const logs2 = await dbGet(`logs_${savedId}`) || {};
              const enriched = enrichLogsWithNames(logs2, STATE.accounts);
              FB.publishMyData(savedUsername, enriched, prs2, plan2?.photo||null).catch(()=>{});
            } else if (savedFriends) {
              STATE.friends.list = savedFriends;
            }
            startFriendsListener(savedUsername);
          } catch(fbErr) {
            console.warn("Supabase init:", fbErr);
            if (savedFriends) STATE.friends.list = savedFriends;
          }
        }
        STATE.appState = "app";
      } else {
        STATE.appState = "onboarding";
      }
    }
  } catch(e) {
    STATE.appState = "onboarding";
  }

  render();

  // Controlla se ieri non è stato completato → auto-rest
  if (STATE.appState === "app") {
    await checkDayCompletion();
    // Ricarica repeatDay dopo il check
    STATE._repeatDay = await dbGet(`repeatDay_${STATE.activeId}`);
    render();
  }

  // Nascondi lo splash screen dopo 2 secondi con animazione
  setTimeout(() => {
    splash.classList.add("splash-hide");
    splash.addEventListener("animationend", () => { splash.style.display = "none"; }, { once: true });
  }, 2000);
}

const $$ = id => document.getElementById(id);

init();
</script>
